services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fournier
      POSTGRES_PASSWORD: fournier_dev
      POSTGRES_DB: fournier
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fournier
      POSTGRES_PASSWORD: fournier_dev
      POSTGRES_DB: fournier_test
    ports:
      - "5441:5432"

volumes:
  postgres_data:
